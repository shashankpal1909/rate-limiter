spring.application.name=rate-limiter

spring.data.redis.host=localhost
spring.data.redis.port=6379

rate.limit.max-requests=1000
rate.limit.window-seconds=60

# Redis circuit breaker (fail-open)
rate.limit.circuit-breaker.failure-rate-threshold=50
rate.limit.circuit-breaker.sliding-window-size=20
rate.limit.circuit-breaker.minimum-number-of-calls=10
rate.limit.circuit-breaker.wait-duration-open-seconds=30
rate.limit.circuit-breaker.permitted-calls-half-open=3

# Logging
logging.level.com.shashank.rate_limiter=INFO